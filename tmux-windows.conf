# ================================================================
# my-tmux-settings — Tokyonight Night theme
# Windows (MSYS2 native tmux + Git Bash zsh)
# Font: JetBrainsMono Nerd Font  https://www.nerdfonts.com
# Repo: https://github.com/wjgoarxiv/my-tmux-settings
# ================================================================

# Prefix key
set -g prefix C-b
bind C-b send-prefix

# ── Shell ────────────────────────────────────────────────────────
set -g default-shell "/usr/bin/zsh"

# ── Windows environment ──────────────────────────────────────────
set-environment -g MSYS2_PATH_TYPE "inherit"
set-environment -g USERPROFILE "C:\\Users\\Admin"
set-environment -g HOMEDRIVE "C:"
set-environment -g HOMEPATH "\\Users\\Admin"

# Pane borders
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"
set -g pane-border-status top
set -g pane-border-format " #[fg=#7aa2f7]#{pane_title} "

# Message bar
set -g message-style "bg=#7aa2f7,fg=#16161e,bold"
set -g message-command-style "bg=#e0af68,fg=#16161e,bold"
set -g mode-style "bg=#bb9af7,fg=#c0caf5"

# ── Status bar ───────────────────────────────────────────────────
set -g status-interval 30
set -g status-position top
set -g status-style "bg=#1a1b26,fg=#c0caf5"
set -g status-left-length 100
set -g status-right-length 100

set -g status-left "#[fg=#16161e,bg=#9ece6a]  #S #[fg=#9ece6a,bg=#1a1b26] "
set -g status-right "#[fg=#565f89,bg=#1a1b26]#[fg=#c0caf5,bg=#565f89]  #[fg=#565f89,bg=#3b4261]#[fg=#c0caf5,bg=#3b4261] #{b:pane_current_path} #[fg=#3b4261,bg=#1a1b26] #[fg=#ff9e64,bg=#1a1b26]#[fg=#16161e,bg=#ff9e64]  #[fg=#ff9e64,bg=#3b4261]#[fg=#c0caf5,bg=#3b4261] #{pane_current_command} #[fg=#3b4261,bg=#1a1b26] #[fg=#7aa2f7,bg=#1a1b26]#[fg=#16161e,bg=#7aa2f7]  #[fg=#7aa2f7,bg=#3b4261]#[fg=#c0caf5,bg=#3b4261] #(cat /tmp/tmux-sysinfo.cache 2>/dev/null || echo ' N/A ') #[fg=#3b4261,bg=#1a1b26]"

set -g window-status-format "#[fg=#9aa5ce,bg=#1a1b26]#[fg=#16161e,bg=#9aa5ce] #I #[fg=#9aa5ce,bg=#3b4261]#[fg=#c0caf5,bg=#3b4261] #W #[fg=#3b4261,bg=#1a1b26]"
set -g window-status-current-format "#[fg=#7aa2f7,bg=#1a1b26]#[fg=#16161e,bg=#7aa2f7] #I #[fg=#7aa2f7,bg=#3b4261]#[fg=#c0caf5,bg=#3b4261] #W #[fg=#3b4261,bg=#1a1b26]"
set -g window-status-separator " "
set -g window-status-activity-style "fg=#ff9e64,bg=#1a1b26"

# ── Colors ────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# ── Synchronized Output — eliminates flicker on bulk output ──
set -ga terminal-features ",xterm-256color:Sync"

# ── General ───────────────────────────────────────────────────────
set -g mouse on
set -g focus-events on
set -g allow-passthrough on
set-environment -g TERM_PROGRAM "tmux"
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g automatic-rename off
set -g history-limit 10000
set -s escape-time 10

# Performance — reduces reflow and escape-sequence overhead
set -g aggressive-resize on
set -s set-clipboard off

# Background updater — keeps sysinfo cache warm without blocking the event loop
run -b "while true; do ~/.tmux/sysinfo.sh >/dev/null 2>&1; sleep 25; done"

# Scroll speed
bind-key -T copy-mode-vi WheelUpPane send-keys -X -N 2 scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -X -N 2 scroll-down

# ── Key bindings ──────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "  Config reloaded!"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
