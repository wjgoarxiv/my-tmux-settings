# ================================================================
# tmux-unix.conf — Dracula theme (Mac / WSL2 / Linux)
# Hardcoded colors, no plugin dependency
# Font: JetBrainsMono Nerd Font
# ================================================================

# Prefix
set -g prefix C-b
bind C-b send-prefix

# ── Dracula theme ─────────────────────────────────────────────────
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 5
set -g status-style "bg=#282a36,fg=#f8f8f2"

set -g status-left "#[bg=#50fa7b,fg=#282a36,bold] #S #[fg=#50fa7b,bg=#282a36] "
set -g status-left-length 50

set -g status-right "#[fg=#44475a,bg=#282a36]#[bg=#44475a,fg=#8be9fd] %H:%M #[fg=#6272a4,bg=#44475a]#[bg=#6272a4,fg=#ffb86c] %a #[fg=#bd93f9,bg=#6272a4]#[bg=#bd93f9,fg=#f8f8f2,bold] %d-%b "
set -g status-right-length 80

set -g window-status-format "#[fg=#6272a4] #I #W "
set -g window-status-separator "#[fg=#44475a]|"
set -g window-status-current-format "#[fg=#bd93f9,bg=#282a36]#[bg=#bd93f9,fg=#f8f8f2,bold] #I #W #[fg=#bd93f9,bg=#282a36]"
set -g window-status-activity-style "fg=#ffb86c,bg=#282a36"

set -g pane-active-border-style "fg=#bd93f9"
set -g pane-border-style "fg=#44475a"
set -g message-style "bg=#44475a,fg=#f8f8f2"
set -g message-command-style "bg=#44475a,fg=#f8f8f2"
set -g mode-style "bg=#bd93f9,fg=#f8f8f2"

# ── Colors ────────────────────────────────────────────────────────
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# ── General ───────────────────────────────────────────────────────
set -g mouse on
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X clear-selection

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 10000
set -s escape-time 0

# ── Key bindings ──────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "  Config reloaded!"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
