# ================================================================
# tmux.conf — Tokyonight Night (Mac / WSL2 / Linux)
# No plugin dependency — hardcoded rounded styling
# Font: JetBrainsMono Nerd Font
# ================================================================

# Prefix
set -g prefix C-b
bind C-b send-prefix

# ── Status bar ───────────────────────────────────────────────────
set -g status-position top
set -g status-style "bg=#1a1b26,fg=#c0caf5"
set -g status-left-length 40
set -g status-right-length 250

# Left: session pill (rounded)
set -g status-left "#[fg=#7aa2f7,bg=#1a1b26]#[fg=#16161e,bg=#7aa2f7,bold]  #S #[fg=#7aa2f7,bg=#1a1b26] "

# ── Window tabs (rounded) ────────────────────────────────────────
set -g window-status-format "#[fg=#3b4261,bg=#1a1b26]#[fg=#a9b1d6,bg=#3b4261] #I #W #[fg=#3b4261,bg=#1a1b26]"
set -g window-status-current-format "#[fg=#7aa2f7,bg=#1a1b26]#[fg=#16161e,bg=#7aa2f7,bold] #I #W #[fg=#7aa2f7,bg=#1a1b26]"
set -g window-status-separator " "

# ── Right: status pills (rounded) ───────────────────────────────
# directory
set -g  status-right "#[fg=#565f89,bg=#1a1b26]#[fg=#c0caf5,bg=#565f89]  #{b:pane_current_path} #[fg=#565f89,bg=#1a1b26]"
# sysinfo (CPU/MEM)
set -ag status-right " #[fg=#7aa2f7,bg=#1a1b26]#[fg=#16161e,bg=#7aa2f7,bold] #(~/.tmux/sysinfo.sh) #[fg=#7aa2f7,bg=#1a1b26]"
set -g status-interval 5

# ── Pane borders ─────────────────────────────────────────────────
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"
set -g pane-border-status top
set -g pane-border-format ""

# ── Message / command line ───────────────────────────────────────
set -g message-style "bg=#7aa2f7,fg=#16161e,bold"
set -g message-command-style "bg=#e0af68,fg=#16161e,bold"

# ── Colors ────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# ── Synchronized Output (DEC 2026) — eliminates Claude Code flicker ──
set -ga terminal-overrides ",*:Sync"
set -ga terminal-features ",xterm-256color:Sync"
set -ga terminal-features ",tmux-256color:Sync"

# ── General ───────────────────────────────────────────────────────
set -g mouse on
set -g focus-events on

## bind-keys to adjust the scrolling speed
bind-key -T copy-mode-vi WheelUpPane send-keys -X -N 2 scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -X -N 2 scroll-down

set -g allow-passthrough on
# Do NOT pass TERM from outer shell — let tmux set it correctly
# set -ga update-environment TERM
# set -ga update-environment TERM_PROGRAM
set-environment -g TERM_PROGRAM "tmux"

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g automatic-rename off
set -g history-limit 10000
set -s escape-time 0

# ── Key bindings ──────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "  Config reloaded!"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
