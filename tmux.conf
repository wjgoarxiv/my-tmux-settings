# ================================================================
# my-tmux-settings — Catppuccin Mocha theme
# Compatible: macOS (tmux) + Windows (psmux/PowerShell)
# Font: JetBrainsMono Nerd Font  https://www.nerdfonts.com
# Repo: https://github.com/wjgoarxiv/my-tmux-settings
# ================================================================

# Prefix key
set -g prefix C-b
bind C-b send-prefix

# Pane borders
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#cba6f7"

# Message bar
set -g message-style "bg=#313244,fg=#cdd6f4"
set -g message-command-style "bg=#313244,fg=#cdd6f4"

# ── Status bar (TOP) ──────────────────────────────────────────────
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 40
set -g status-right-length 160

set -g status-left " "
set -g status-right "#[fg=#94e2d5,bg=#1e1e2e]#[fg=#1e1e2e,bg=#94e2d5]  #{b:pane_current_path} #[fg=#94e2d5,bg=#1e1e2e]  #[fg=#89dceb,bg=#1e1e2e]#[fg=#1e1e2e,bg=#89dceb]  #{pane_current_command} #[fg=#89dceb,bg=#1e1e2e]  #[fg=#a6e3a1,bg=#1e1e2e]#[fg=#1e1e2e,bg=#a6e3a1]  #S #[fg=#a6e3a1,bg=#1e1e2e]  #[fg=#fab387,bg=#1e1e2e]#[fg=#1e1e2e,bg=#fab387]  %H:%M  %d-%b-%y #[fg=#fab387,bg=#1e1e2e]"

set -g window-status-format "#[fg=#313244,bg=#1e1e2e]#[fg=#bac2de,bg=#313244] #I  #W #[fg=#313244,bg=#1e1e2e]"
set -g window-status-current-format "#[fg=#cba6f7,bg=#1e1e2e]#[fg=#1e1e2e,bg=#cba6f7] #I  #W #[fg=#cba6f7,bg=#1e1e2e]"
set -g window-status-separator " "

# ── Colors ────────────────────────────────────────────────────────
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# ── General ───────────────────────────────────────────────────────
set -g mouse on
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X clear-selection

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 10000
set -s escape-time 0

# ── Key bindings ──────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "  Config reloaded!"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
