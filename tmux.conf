# ================================================================
# my-tmux-settings — Dracula theme
# Compatible: macOS (tmux) + Windows (psmux/PowerShell)
# Font: JetBrainsMono Nerd Font  https://www.nerdfonts.com
# Repo: https://github.com/wjgoarxiv/my-tmux-settings
# ================================================================

set -g prefix C-b
bind C-b send-prefix

set -g pane-border-style "fg=#44475a"
set -g pane-active-border-style "fg=#bd93f9"
set -g message-style "bg=#44475a,fg=#f8f8f2"
set -g message-command-style "bg=#44475a,fg=#f8f8f2"

set -g status on
set -g status-interval 5
set -g status-position top
set -g status-style "bg=#282a36,fg=#f8f8f2"
set -g status-left-length 40
set -g status-right-length 160
set -g status-left "#[fg=#50fa7b,bg=#282a36]#[fg=#282a36,bg=#50fa7b]  #S #[fg=#50fa7b,bg=#282a36] "
set -g status-right "#[fg=#6272a4,bg=#282a36]#[fg=#f8f8f2,bg=#6272a4]  #{b:pane_current_path} #[fg=#6272a4,bg=#282a36]  #[fg=#ffb86c,bg=#282a36]#[fg=#282a36,bg=#ffb86c]  #(whoami) #[fg=#ffb86c,bg=#282a36]  #[fg=#8be9fd,bg=#282a36]#[fg=#282a36,bg=#8be9fd]  #H #[fg=#8be9fd,bg=#282a36]"
set -g window-status-format "#[fg=#44475a,bg=#282a36]#[fg=#f8f8f2,bg=#44475a] #W #[fg=#44475a,bg=#282a36]"
set -g window-status-current-format "#[fg=#bd93f9,bg=#282a36]#[fg=#282a36,bg=#bd93f9] #W #[fg=#bd93f9,bg=#282a36]"
set -g window-status-separator " "

set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 10000
set -s escape-time 0

bind r source-file ~/.tmux.conf \; display "  Config reloaded!"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
