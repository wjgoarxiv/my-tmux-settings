# ================================================================
# tmux-unix.conf — Catppuccin Mocha (Mac / WSL2 / Linux)
# Uses official catppuccin/tmux bash plugin
# Font: JetBrainsMono Nerd Font
# ================================================================

# Prefix
set -g prefix C-b
bind C-b send-prefix

# ── Catppuccin options (set BEFORE run) ───────────────────────────
set -g @catppuccin_flavor "mocha"
set -g status-position top

set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_number_position "left"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text " #W"

set -g @catppuccin_status_modules_right "directory application uptime"
set -g @catppuccin_status_left_separator ""
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

# ── Load catppuccin plugin ────────────────────────────────────────
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# ── System info (CPU / MEM) appended after catppuccin ─────────────
set -ga status-right "#[fg=#89b4fa,bg=#1e1e2e] #(~/.tmux/sysinfo.sh) "

# ── Colors ────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# ── Synchronized Output (DEC 2026) — eliminates Claude Code flicker ──
set -ga terminal-overrides ",*:Sync"
set -ga terminal-features ",xterm-256color:Sync"
set -ga terminal-features ",tmux-256color:Sync"

# ── General ───────────────────────────────────────────────────────
set -g mouse on
set -g focus-events on

## bind-keys to adjust the scrolling speed
bind-key -T copy-mode-vi WheelUpPane send-keys -X -N 2 scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -X -N 2 scroll-down

set -g allow-passthrough on
# Do NOT pass TERM from outer shell — let tmux set it correctly
# set -ga update-environment TERM
# set -ga update-environment TERM_PROGRAM
set-environment -g TERM_PROGRAM "tmux"

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g automatic-rename off
set -g history-limit 10000
set -s escape-time 0

# ── Key bindings ──────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "  Config reloaded!"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
