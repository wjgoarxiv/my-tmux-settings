# ================================================================
# my-tmux-settings — Tokyonight Night theme
# macOS / Linux / WSL2
# Font: JetBrainsMono Nerd Font  https://www.nerdfonts.com
# Repo: https://github.com/wjgoarxiv/my-tmux-settings
# ================================================================

# Prefix key
set -g prefix C-b
bind C-b send-prefix

# ── Shell ────────────────────────────────────────────────────────
# set -g default-shell "/usr/bin/zsh"

# Pane borders
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"
set -g pane-border-status top
set -g pane-border-format " #[fg=#7aa2f7]#{pane_title} "

# Message bar
set -g message-style "bg=#7aa2f7,fg=#16161e,bold"
set -g message-command-style "bg=#e0af68,fg=#16161e,bold"
set -g mode-style "bg=#bb9af7,fg=#c0caf5"

# ── Status bar ───────────────────────────────────────────────────
set -g status-interval 30
set -g status-position top
set -g status-style "bg=#1a1b26,fg=#c0caf5"
set -g status-left-length 100
set -g status-right-length 100

set -g status-left "#[fg=#16161e,bg=#9ece6a]  #S #[fg=#9ece6a,bg=#1a1b26] "
set -g status-right "#[fg=#73daca,bg=#1a1b26]#[fg=#16161e,bg=#73daca]  #[fg=#73daca,bg=#3b4261]#[fg=#c0caf5,bg=#3b4261] #{b:pane_current_path} #[fg=#3b4261,bg=#1a1b26] #[fg=#ff9e64,bg=#1a1b26]#[fg=#16161e,bg=#ff9e64]  #[fg=#ff9e64,bg=#3b4261]#[fg=#c0caf5,bg=#3b4261] #{pane_current_command} #[fg=#3b4261,bg=#1a1b26] #[fg=#7aa2f7,bg=#1a1b26]#[fg=#16161e,bg=#7aa2f7]  #[fg=#7aa2f7,bg=#3b4261]#[fg=#c0caf5,bg=#3b4261] #(~/.tmux/sysinfo.sh) #[fg=#3b4261,bg=#1a1b26] #[fg=#9ece6a,bg=#1a1b26]#[fg=#16161e,bg=#9ece6a]  #[fg=#9ece6a,bg=#3b4261]#[fg=#c0caf5,bg=#3b4261] #(~/.tmux/battery.sh) #[fg=#3b4261,bg=#1a1b26] #[fg=#bb9af7,bg=#1a1b26]#[fg=#16161e,bg=#bb9af7]  #[fg=#bb9af7,bg=#3b4261]#[fg=#c0caf5,bg=#3b4261] %H:%M #[fg=#3b4261,bg=#1a1b26]"

set -g window-status-format "#[fg=#9aa5ce,bg=#1a1b26]#[fg=#16161e,bg=#9aa5ce] #I #[fg=#9aa5ce,bg=#3b4261]#[fg=#c0caf5,bg=#3b4261] #W #[fg=#3b4261,bg=#1a1b26]"
set -g window-status-current-format "#[fg=#7aa2f7,bg=#1a1b26]#[fg=#16161e,bg=#7aa2f7] #I #[fg=#7aa2f7,bg=#3b4261]#[fg=#c0caf5,bg=#3b4261] #W #[fg=#3b4261,bg=#1a1b26]"
set -g window-status-separator " "
set -g window-status-activity-style "fg=#ff9e64,bg=#1a1b26"
set -g monitor-activity on

# ── Colors ────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# ── Synchronized Output (DEC 2026) — eliminates Claude Code flicker ──
set -ga terminal-overrides ",*:Sync"
set -ga terminal-features ",xterm-256color:Sync"
set -ga terminal-features ",tmux-256color:Sync"

# ── General ───────────────────────────────────────────────────────
set -g mouse on
set -g focus-events on
set -g allow-passthrough on
set-environment -g TERM_PROGRAM "tmux"
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g automatic-rename off
set -g history-limit 100000
set -s escape-time 0

# Scroll speed
bind-key -T copy-mode-vi WheelUpPane send-keys -X -N 2 scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -X -N 2 scroll-down
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# ── Key bindings ──────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "  Config reloaded!"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
